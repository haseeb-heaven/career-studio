<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#e2e8f0" rx="10"/>
  <rect x="0" y="0" width="900" height="42" fill="#f8fafc" rx="10"/>
  <rect x="0" y="32" width="900" height="10" fill="#f8fafc"/>
  <circle cx="22" cy="21" r="7" fill="#ef4444"/>
  <circle cx="44" cy="21" r="7" fill="#f59e0b"/>
  <circle cx="66" cy="21" r="7" fill="#22c55e"/>
  <rect x="120" y="9" width="620" height="24" rx="5" fill="#e2e8f0"/>
  <text x="430" y="26" text-anchor="middle" font-size="12" fill="#64748b">localhost:5173</text>

  <!-- App background -->
  <rect x="0" y="42" width="900" height="518" fill="#f1f5f9"/>

  <!-- Center card area -->
  <g transform="translate(225, 100)">
    <!-- Title -->
    <text x="225" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#1e3a8a">Career Studio</text>
    <text x="225" y="68" text-anchor="middle" font-size="14" fill="#64748b">Upload your resume to get started</text>

    <!-- Upload card -->
    <rect x="30" y="88" width="390" height="250" rx="18" fill="white" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 5"/>

    <!-- File icon -->
    <text x="225" y="170" text-anchor="middle" font-size="52" fill="#94a3b8">📄</text>

    <!-- Upload text -->
    <text x="225" y="210" text-anchor="middle" font-size="16" font-weight="600" fill="#374151">Drag &amp; drop a file here</text>
    <text x="225" y="232" text-anchor="middle" font-size="13" fill="#64748b">or click to browse</text>

    <!-- Supported formats badge -->
    <rect x="90" y="248" width="270" height="28" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="225" y="267" text-anchor="middle" font-size="12" fill="#94a3b8">Supported: .json, .csv, .xml, .docx, .doc, .pdf</text>

    <!-- Format pills row -->
    <g transform="translate(30, 360)">
      <rect x="0" y="0" width="56" height="26" rx="13" fill="#dbeafe"/>
      <text x="28" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">JSON</text>

      <rect x="66" y="0" width="56" height="26" rx="13" fill="#dcfce7"/>
      <text x="94" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">CSV</text>

      <rect x="132" y="0" width="56" height="26" rx="13" fill="#fef3c7"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">XML</text>

      <rect x="198" y="0" width="60" height="26" rx="13" fill="#ede9fe"/>
      <text x="228" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">DOCX</text>

      <rect x="268" y="0" width="56" height="26" rx="13" fill="#fce7f3"/>
      <text x="296" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#be185d">PDF</text>
    </g>
  </g>
</svg>
