<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect width="200" height="200" rx="44" fill="url(#shine)"/>
  <!-- Graduation cap board -->
  <polygon points="100,42 170,78 100,114 30,78" fill="white" opacity="0.95"/>
  <!-- Cap center dot -->
  <circle cx="100" cy="42" r="9" fill="#34d399"/>
  <!-- Tassel line -->
  <line x1="170" y1="78" x2="170" y2="114" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <circle cx="170" cy="118" r="8" fill="#34d399"/>
  <!-- Diploma scroll -->
  <rect x="64" y="120" width="72" height="44" rx="10" fill="white" opacity="0.92"/>
  <line x1="76" y1="135" x2="124" y2="135" stroke="#1e3a8a" stroke-width="5" stroke-linecap="round"/>
  <line x1="76" y1="148" x2="112" y2="148" stroke="#0f766e" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="158" x2="100" y2="158" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
