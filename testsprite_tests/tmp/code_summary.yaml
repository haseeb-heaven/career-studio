version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 19 + Vite
  - styling: Tailwind CSS + inline CSS variables
  - http_client: Axios
  - other: React hooks (useState, useEffect, useRef)
features:
  - name: Login & Registration Screen
    description: Full auth UI — Sign In, Create Account, Forgot Password, Reset Password flows. Guest (no-account) access also supported.
    files:
      - frontend/src/components/LoginScreen.tsx
      - frontend/src/App.tsx
    pages:
      - path: /
        description: Login screen shown on first visit or after logout. Contains Sign In / Create Account tabs, Forgot Password link, and Continue as Guest button.
    interactions:
      - action: Click "Sign In" tab and submit valid credentials
        expected: Redirected to Upload screen; JWT stored in localStorage
      - action: Click "Create Account" tab and submit valid username/password
        expected: Account created, JWT stored, redirected to Upload screen
      - action: Submit login with wrong password
        expected: Error message displayed inline
      - action: Click "Forgot Password?" and submit a username
        expected: Success message shown with dev reset URL link
      - action: Click "Continue as guest"
        expected: Redirected to Upload screen without auth

  - name: Upload / Home Screen
    description: Landing page after auth. Allows resume file upload via drag-and-drop or file picker. Shows saved profiles list. Features overview grid.
    files:
      - frontend/src/components/UploadScreen.tsx
    pages:
      - path: / (upload screen, after auth)
        description: Upload drop zone supporting .json/.csv/.xml/.docx/.doc/.pdf/.tex files. Header with nav, feature grid, footer.
    interactions:
      - action: Click upload drop zone and select a supported file
        expected: File parsed, redirected to Profile Editor with the new profile
      - action: Drag and drop a resume file onto the drop zone
        expected: File parsed, redirected to Profile Editor
      - action: Click "📂 Open Saved Profile" button
        expected: List of user's saved profiles appears
      - action: Click "Open →" on a saved profile
        expected: Profile Editor opens for that profile
      - action: Click 🗑 delete button on a saved profile
        expected: Confirmation prompt appears; profile removed from list on confirm
      - action: Click "Sign Out"
        expected: Redirected to Login screen; localStorage cleared

  - name: Profile Editor — Contact & Summary Tabs
    description: Edit top-level profile fields (name, email, phone, location, links) and professional summary.
    files:
      - frontend/src/components/ProfileEditor.tsx
      - frontend/src/components/tabs/ContactTab.tsx
      - frontend/src/components/tabs/SummaryTab.tsx
    pages:
      - path: / (editor screen)
        description: Tabbed profile editor. Contact tab is the default tab.
    interactions:
      - action: Edit full name field and save
        expected: Profile patched successfully; updated value persists on reload
      - action: Edit summary text and save
        expected: Summary updated via PATCH /api/profiles/{id}

  - name: Profile Editor — Skills Tab
    description: View, add, and delete skills with name, category, and years of experience.
    files:
      - frontend/src/components/tabs/SkillsTab.tsx
    interactions:
      - action: Add a new skill with name and category
        expected: Skill appears in list; persisted to backend
      - action: Delete a skill
        expected: Skill removed from list

  - name: Profile Editor — Experience Tab
    description: View, add, and delete work experience entries with company, role, dates, and bullet points.
    files:
      - frontend/src/components/tabs/ExperienceTab.tsx
    interactions:
      - action: Add a new experience entry
        expected: Entry appears in list with company, role, and date fields
      - action: Delete an experience entry
        expected: Entry removed from list

  - name: Profile Editor — Projects, Education, Certifications Tabs
    description: CRUD for project portfolio, education history, and professional certifications.
    files:
      - frontend/src/components/tabs/ProjectsTab.tsx
      - frontend/src/components/tabs/EducationTab.tsx
      - frontend/src/components/tabs/CertificationsTab.tsx
    interactions:
      - action: Add a project with name and description
        expected: Project appears in list
      - action: Add an education entry
        expected: Education appears in list
      - action: Add a certification
        expected: Certification appears in list

  - name: Profile Editor — Analysis Tab
    description: AI resume scoring panel showing score (0-100), strengths, weaknesses, suggestions, and ATS keywords.
    files:
      - frontend/src/components/tabs/AnalysisTab.tsx
    interactions:
      - action: Click "Analyze Resume" button
        expected: Loading state shown; AI analysis result displayed with score, strengths, weaknesses, suggestions, ATS keywords
      - action: View analysis without AI key configured
        expected: Error message shown explaining AI is not configured

  - name: Profile Editor — Cover Letter Tab
    description: Generate tailored AI cover letters by entering job title, company, and optional notes.
    files:
      - frontend/src/components/tabs/CoverLetterTab.tsx
    interactions:
      - action: Enter job title and company, click Generate
        expected: Cover letter text displayed; saved to history
      - action: View list of previously generated cover letters
        expected: Saved letters listed with job title and company

  - name: Profile Editor — Jobs Tab
    description: Search for matching jobs across multiple portals using profile skills. Shows match score per result.
    files:
      - frontend/src/components/tabs/JobsTab.tsx
    interactions:
      - action: Click "Search Jobs" button
        expected: Job results appear with title, company, location, source badge, and match score
      - action: Select a specific portal filter (e.g., remoteok)
        expected: Results filtered to that portal only
      - action: Click a job result
        expected: Opens the job URL in a new tab

  - name: Profile Editor — Settings Tab
    description: Configure AI provider (OpenAI / Anthropic / Ollama) and API keys. Keys are stored encrypted.
    files:
      - frontend/src/components/tabs/SettingsTab.tsx
    interactions:
      - action: Enter an OpenAI API key and save
        expected: Key saved; success message shown
      - action: Toggle to Ollama local AI
        expected: Ollama URL and model fields appear

  - name: Export Panel
    description: Export the profile in multiple formats (JSON, CSV, XML, DOCX, PDF, LaTeX, HTML, portfolio).
    files:
      - frontend/src/components/ExportPanel.tsx
    interactions:
      - action: Click a format button (e.g., JSON)
        expected: File download triggered in the browser
      - action: Click PDF export
        expected: PDF file downloaded

  - name: Activity Logs Tab
    description: View a read-only list of recent actions (imports, exports, AI calls, deletions).
    files:
      - frontend/src/components/tabs/LogsTab.tsx
    interactions:
      - action: Navigate to Logs tab
        expected: List of recent activity entries shown with action type, detail, and timestamp

  - name: Toast Notifications
    description: Global toast notification system for success/error feedback across all actions.
    files:
      - frontend/src/components/Toast.tsx
    interactions:
      - action: Trigger any save/delete/import action
        expected: Toast notification appears briefly and auto-dismisses

known_limitations:
  - issue: Export button triggers a backend endpoint that has a known TypeError bug (_check_ownership called with wrong arity)
    location: frontend/src/components/ExportPanel.tsx → backend/routers/export_router.py:27
    impact: All export format downloads will fail with a 500 error until the backend bug is fixed
  - issue: AI tabs (Analysis, Cover Letter, Roadmap) silently fail if no API key is configured in Settings
    location: frontend/src/components/tabs/AnalysisTab.tsx etc.
    impact: Users may not understand why AI features return errors without a clear setup guide
