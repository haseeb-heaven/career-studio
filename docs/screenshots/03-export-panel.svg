<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="580" fill="#e2e8f0" rx="10"/>
  <rect x="0" y="0" width="900" height="42" fill="#f8fafc" rx="10"/>
  <rect x="0" y="32" width="900" height="10" fill="#f8fafc"/>
  <circle cx="22" cy="21" r="7" fill="#ef4444"/>
  <circle cx="44" cy="21" r="7" fill="#f59e0b"/>
  <circle cx="66" cy="21" r="7" fill="#22c55e"/>
  <rect x="120" y="9" width="620" height="24" rx="5" fill="#e2e8f0"/>
  <text x="430" y="26" text-anchor="middle" font-size="12" fill="#64748b">localhost:5173</text>

  <!-- App bg -->
  <rect x="0" y="42" width="900" height="538" fill="#f1f5f9"/>

  <!-- Top nav bar -->
  <rect x="0" y="42" width="900" height="52" fill="#1e3a8a"/>
  <text x="30" y="73" font-size="13" fill="#93c5fd">← Upload</text>
  <text x="110" y="74" font-size="18" font-weight="700" fill="white">Haseeb Mir</text>
  <text x="820" y="73" font-size="12" fill="#93c5fd">Profile #1</text>

  <!-- Tab bar -->
  <rect x="30" y="108" width="840" height="44" rx="12" fill="white"/>
  <text x="76" y="135" text-anchor="middle" font-size="13" fill="#64748b">Contact</text>
  <text x="152" y="135" text-anchor="middle" font-size="13" fill="#64748b">Summary</text>
  <text x="228" y="135" text-anchor="middle" font-size="13" fill="#64748b">Skills</text>
  <text x="310" y="135" text-anchor="middle" font-size="13" fill="#64748b">Experience</text>
  <text x="400" y="135" text-anchor="middle" font-size="13" fill="#64748b">Projects</text>
  <text x="480" y="135" text-anchor="middle" font-size="13" fill="#64748b">Education</text>
  <text x="572" y="135" text-anchor="middle" font-size="13" fill="#64748b">Certifications</text>
  <!-- Active: Export -->
  <rect x="622" y="112" width="72" height="36" rx="9" fill="#1d4ed8"/>
  <text x="658" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="white">Export</text>

  <!-- Content card -->
  <rect x="30" y="168" width="840" height="360" rx="12" fill="white"/>

  <!-- Export panel content -->
  <text x="54" y="202" font-size="16" font-weight="600" fill="#1e293b">Export Profile</text>
  <text x="54" y="222" font-size="13" fill="#64748b">Download your profile in any of the supported formats.</text>

  <!-- Format cards grid -->
  <g transform="translate(54, 244)">
    <!-- JSON -->
    <rect x="0" y="0" width="142" height="110" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="71" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1d4ed8" font-family="monospace">{ }</text>
    <text x="71" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">JSON</text>
    <text x="71" y="88" text-anchor="middle" font-size="11" fill="#94a3b8">Structured data</text>

    <!-- CSV -->
    <rect x="158" y="0" width="142" height="110" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="229" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1d4ed8" font-family="monospace">⊞</text>
    <text x="229" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">CSV</text>
    <text x="229" y="88" text-anchor="middle" font-size="11" fill="#94a3b8">Spreadsheet</text>

    <!-- XML -->
    <rect x="316" y="0" width="142" height="110" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="387" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8" font-family="monospace">&lt;/&gt;</text>
    <text x="387" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">XML</text>
    <text x="387" y="88" text-anchor="middle" font-size="11" fill="#94a3b8">Markup format</text>

    <!-- DOCX -->
    <rect x="474" y="0" width="142" height="110" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="545" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1d4ed8">W</text>
    <text x="545" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">DOCX</text>
    <text x="545" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">Word document</text>

    <!-- PDF -->
    <rect x="632" y="0" width="142" height="110" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="703" y="42" text-anchor="middle" font-size="22" fill="#ea580c">⬇</text>
    <text x="703" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#9a3412">PDF</text>
    <text x="703" y="88" text-anchor="middle" font-size="11" fill="#c2410c">Print-ready</text>

    <!-- Info note -->
    <rect x="0" y="128" width="774" height="42" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="14" y="153" font-size="12" fill="#166534">✓  All exports are generated live from your stored profile — changes you save are reflected immediately in every download.</text>
  </g>
</svg>
